
<svg width="650" height="120" xmlns="http://www.w3.org/2000/svg">

<style>
    :root {
         --border-color: #d1d9e0;
         --fgColor-default: #1f2328;
         --fgColor-accent: #0969da;
         --fgColor-muted: #59636e;
         --fgColor-success: #1a7f37;
         --fgColor-danger: #d1242f;
         --fgColor-done: #8250df;
         --bgColor-neutral-muted: #818b981f;
         --bgColor-success: #1f883d;
         --text-large: 1rem;
         --text-medium: 0.875rem;
         --text-small: 0.75rem;
         --text-weight-light: 300;
         --text-weight-normal: 400;
         --text-weight-medium: 500;
         --text-weight-semibold: 600;
     }

    text {
        font-family: Arial, sans-serif;
        font-size: var(--text-medium);
    }

    text.title {
        fill: var(--fgColor-default);
        font-size: var(--text-large);
        font-weight: var(--text-weight-semibold);
    }

    text.small {
        font-size: var(--text-small);
        font-weight: var(--text-weight-normal);
    }

    text.medium {
        font-size: var(--text-medium);
        font-weight: var(--text-weight-normal);
    }

    text.muted {
        fill: var(--fgColor-muted);
    }

    text.counter {
        fill: var(--fgColor-muted);
        font-size: 40px;
        text-anchor: middle;
    }

    text.button {
        font-size: 14px;
        fill: var(--fgColor-default);
    }

    text.label {
        font-size: var(--text-medium);
        font-weight: var(--text-weight-semibold);
    }

    text.label-muted {
        fill: var(--fgColor-muted);
        font-size: var(--text-small);
        font-weight: var(--text-weight-normal);
    }

    rect.labelBg {
        fill-opacity: 1.0;
    }

    rect.labelBg-muted {
        fill: none;
        stroke: var(--border-color);
        stroke-width: 0.5px;
    }

    rect.card {
        fill: none;
        stroke: var(--border-color);
        stroke-width: 1.5px;
        rx: 6px;
        ry: 6px;
    }

    rect.progress-bg {
        fill: var(--bgColor-neutral-muted);
    }

    rect.progress-fill {
        fill: var(--bgColor-success);
    }

    .icon-open {
        fill: var(--fgColor-success);
    }

    .icon-closed {
        fill: var(--fgColor-muted);
    }

    .icon-completed {
        fill: var(--fgColor-done);
    }

    .icon-danger {
        fill: var(--fgColor-danger);
    }

    .icon-muted {
        fill: var(--fgColor-muted);
    }

    .icon-default {
        fill: var(--fgColor-default);
    }

    @media (prefers-color-scheme: light) {
        text.label {
            fill: #000000;
        }
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --border-color: #3d444d;
            --fgColor-default: #d1d7e0;
            --fgColor-muted: #9198a1;
            --fgColor-accent: #478be6;
            --fgColor-success: #57ab5a;
            --fgColor-danger: #e5534b;
            --fgColor-done: #986ee2;
            --bgColor-neutral-muted: #656c7633;
            --bgColor-success: #347d39;
            --button-background-color: #2a313c;
        }

        rect.labelBg {
            fill-opacity: 0.2;
        }
    }
</style>


<!-- Carte globale -->
<rect class="card" x="0" y="0" width="650" height="120"/>

<!-- Titre de l'issue -->
<text class="title" x="12" y="40">
    Finish CSV export <tspan class="muted">#5</tspan>
</text>

<!-- Description: auteur + commentaires -->
<text class="muted" x="12" y="70">
    Ouverte par foll0wer · 0 commentaires
</text>

<!-- Labels à gauche -->

        <g transform="translate(516, 12)">
            <rect class="labelBg-muted" x="0" y="0" width="62" height="24" rx="12" />
            <text class="label-muted" x="31.0" y="16" text-anchor="middle">bug</text>
        </g>
        
        <g transform="translate(318, 12)">
            <rect class="labelBg-muted" x="0" y="0" width="188" height="24" rx="12" />
            <text class="label-muted" x="94.0" y="16" text-anchor="middle">status:doing</text>
        </g>
        

<!-- Avatar en cercle (clipPath) -->
<defs>
    <clipPath id="avatar-clip">
        <circle cx="0" cy="0" r="20.0" />
    </clipPath>
</defs>

<g transform="translate(618.0, 60.0)">
    <image href="data:image/png;base64,"
           x="-20.0" y="-20.0"
           width="40" height="40"
           clip-path="url(#avatar-clip)" />
    <circle cx="0" cy="0" r="20.0" 
            fill="none" stroke="var(--border-color)" stroke-width="1.2"/>
</g>

</svg>
