
<svg width="680" height="130" xmlns="http://www.w3.org/2000/svg">

<style>
    :root {
         --border-color: #d1d9e0;
         --fgColor-default: #1f2328;
         --fgColor-accent: #0969da;
         --fgColor-muted: #59636e;
         --fgColor-success: #1a7f37;
         --fgColor-danger: #d1242f;
         --fgColor-done: #8250df;
         --bgColor-neutral-muted: #818b981f;
         --bgColor-success: #1f883d;
         --text-large: 1rem;
         --text-medium: 0.875rem;
         --text-small: 0.75rem;
         --text-weight-light: 300;
         --text-weight-normal: 400;
         --text-weight-medium: 500;
         --text-weight-semibold: 600;
     }

    text {
        font-family: Arial, sans-serif;
        font-size: var(--text-medium);
    }

    text.title {
        fill: var(--fgColor-default);
        font-size: var(--text-large);
        font-weight: var(--text-weight-semibold);
    }

    text.small {
        font-size: var(--text-small);
        font-weight: var(--text-weight-normal);
    }

    text.medium {
        font-size: var(--text-medium);
        font-weight: var(--text-weight-normal);
    }

    text.muted {
        fill: var(--fgColor-muted);
    }

    text.counter {
        fill: var(--fgColor-muted);
        font-size: 40px;
        text-anchor: middle;
    }

    text.button {
        font-size: 14px;
        fill: var(--fgColor-default);
    }

    text.label {
        font-size: var(--text-medium);
        font-weight: var(--text-weight-semibold);
    }

    text.label-muted {
        fill: var(--fgColor-muted);
        font-size: var(--text-small);
        font-weight: var(--text-weight-normal);
    }

    rect.labelBg {
        fill-opacity: 1.0;
    }

    rect.labelBg-muted {
        fill: none;
        stroke: var(--border-color);
        stroke-width: 0.5px;
    }

    rect.card {
        fill: none;
        stroke: var(--border-color);
        stroke-width: 1.5px;
        rx: 6px;
        ry: 6px;
    }

    rect.progress-bg {
        fill: var(--bgColor-neutral-muted);
    }

    rect.progress-fill {
        fill: var(--bgColor-success);
    }

    .icon-open {
        fill: var(--fgColor-success);
    }

    .icon-closed {
        fill: var(--fgColor-muted);
    }

    .icon-completed {
        fill: var(--fgColor-done);
    }

    .icon-danger {
        fill: var(--fgColor-danger);
    }

    .icon-muted {
        fill: var(--fgColor-muted);
    }

    .icon-default {
        fill: var(--fgColor-default);
    }

    @media (prefers-color-scheme: light) {
        text.label {
            fill: #000000;
        }
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --border-color: #3d444d;
            --fgColor-default: #d1d7e0;
            --fgColor-muted: #9198a1;
            --fgColor-accent: #478be6;
            --fgColor-success: #57ab5a;
            --fgColor-danger: #e5534b;
            --fgColor-done: #986ee2;
            --bgColor-neutral-muted: #656c7633;
            --bgColor-success: #347d39;
            --button-background-color: #2a313c;
        }

        rect.labelBg {
            fill-opacity: 0.2;
        }
    }
</style>


<!-- Carte -->
<rect class="card" x="0" y="0" width="680" height="130"/>

<!-- Titre -->
<text class="title" x="14" y="42">
    Add "share" option to wines <tspan class="muted">#2</tspan>
</text>

<!-- Sous-ligne : auteur + commentaires -->
<text class="muted" x="14" y="72">
    Ouverte par foll0wer · 0 commentaires
</text>

<!-- Labels -->

        <g transform="translate(499, 14)">
            <rect class="labelBg"
                  x="0" y="0"
                  width="101" height="26" rx="13"
                  fill="#a2eeef" stroke="#a2eeef" />
            <text class="label"
                  x="50.5" y="17"
                  text-anchor="middle"
                  fill="white">enhancement</text>
        </g>
        
        <g transform="translate(399, 14)">
            <rect class="labelBg"
                  x="0" y="0"
                  width="90" height="26" rx="13"
                  fill="#4e0c64" stroke="#4e0c64" />
            <text class="label"
                  x="45.0" y="17"
                  text-anchor="middle"
                  fill="white">status:todo</text>
        </g>
        

<!-- Avatar (cercle + clipping) -->
<defs>
    <clipPath id="avatar-clip">
        <circle cx="0" cy="0" r="21.0" />
    </clipPath>
</defs>

<g transform="translate(645.0, 65.0)">
    <image x="-21.0" y="-21.0"
           width="42" height="42"
           href="data:image/png;base64,"
           clip-path="url(#avatar-clip)" />
    <circle cx="0" cy="0" r="21.0"
            fill="none" stroke="var(--border-color)" stroke-width="1.2"/>
</g>

</svg>
